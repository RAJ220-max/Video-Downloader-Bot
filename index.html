<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader Pro</title>
    <script src="https://sad.adsgram.ai/js/adsgram.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .logo { font-size: 50px; margin-bottom: 10px; }
        button { background: #0088cc; border: none; color: white; padding: 15px 40px; font-size: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⬇️</div>
        <h2>Video Downloader Pro</h2>
        <p>Click the button below to process your request.</p>
        <button id="adBtn">Start Instant Processing</button>
    </div>

    <script>
        const adBlockId = "38853";
        // Adsgram initialize karein
        const AdController = window.Adsgram.init({ blockId: adBlockId });

        document.getElementById("adBtn").onclick = () => {
            // Ad show karne ka command
            AdController.show()
                .then((result) => {
                    // Success: Ad dekhi gayi
                    window.Telegram.WebApp.close();
                })
                .catch((result) => {
                    // Agar koi error aaye toh console mein check karo
                    console.log("Ad error:", result);
                    alert("Ad load nahi ho paayi, please wait karein ya phir se try karein.");
                });
        };
    </script>
</body>
</html>
