
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <script src="https://sad.adsgram.ai/js/adsgram.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h3>Ad dekhne ke liye click karein</h3>
        <button id="adBtn" style="padding: 15px 30px; font-size: 18px; cursor: pointer;">Watch Ad</button>
    </div>

    <script>
        const adBlockId = "38870";
        const AdController = window.Adsgram.init({ blockId: adBlockId });

        document.getElementById("adBtn").onclick = () => {
            AdController.show()
                .then((result) => {
                    // Ad puri dekh li, ab sidha bot close kar do
                    window.Telegram.WebApp.close();
                })
                .catch((result) => {
                    console.log("Ad failed/closed", result);
                    alert("Ad pura dekhna zaroori hai!");
                });
        };
    </script>
</body>
</html>
