<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader Pro</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Adsgram SDK -->
    <script src="https://sad.adsgram.ai/js/adsgram.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: #0f0f0f; 
            color: #ffffff; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card { 
            background: #1c1c1c; 
            border-radius: 25px; 
            padding: 30px; 
            width: 90%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid #333;
        }
        /* Logo Styling */
        .logo-box img { 
            width: 90px; 
            height: 90px; 
            border-radius: 20px; 
            margin-bottom: 20px;
            border: 2px solid #0088cc;
        }
        h2 { margin: 0 0 10px 0; color: #ffffff; font-size: 24px; }
        p { color: #888; margin-bottom: 25px; font-size: 14px; }
        
        #adBtn { 
            background: linear-gradient(135deg, #0088cc, #005f99); 
            border: none; 
            color: white; 
            padding: 18px; 
            border-radius: 15px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            width: 100%; 
            transition: all 0.3s ease;
        }
        #adBtn:disabled { background: #444; color: #888; cursor: not-allowed; }
        #adBtn:active:not(:disabled) { transform: scale(0.95); }
        .loading-text { margin-top: 15px; font-size: 12px; color: #555; }
    </style>
</head>
<body>

    <div class="card">
        <!-- Logo: Yahan image ka link daal dena -->
        <div class="logo-box">
            <img src="https://i.ibb.co/your-logo-here.png" alt="Logo">
        </div>
        
        <h2>Verification Required</h2>
        <p>Please watch the short advertisement below to unlock your download link immediately.</p>
        
        <button id="adBtn">Watch Ad & Proceed</button>
        <div class="loading-text" id="status">Preparing ad...</div>
    </div>

    <script>
        const adPromise = window.Adsgram.init({ blockId: "38853" });
        const btn = document.getElementById("adBtn");
        const status = document.getElementById("status");

        // Start mein button ko disable rakho
        btn.disabled = true;
        status.innerText = "Please wait, loading ad...";

        // Ad load hone ka intezar karo
        adPromise.then((AdController) => {
            status.innerText = "Ad ready!";
            btn.disabled = false;

            btn.onclick = () => {
                status.innerText = "Opening ad...";
                AdController.show()
                    .then((result) => {
                        // Success par Mini App close ho jayega
                        window.Telegram.WebApp.close();
                    })
                    .catch((result) => {
                        status.innerText = "Ad failed, please try again.";
                    });
            };
        }).catch((err) => {
            status.innerText = "Adsgram error, check your connection.";
        });
    </script>
</body>
</html>
